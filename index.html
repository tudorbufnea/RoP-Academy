function parseCSV(text) {
  const lines = text.trim().split("\n").filter(Boolean);
  if (lines.length < 2) return [];
  const header = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, "").toLowerCase());

    const vals = line.split(",");
